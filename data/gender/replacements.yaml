# Word-level replacements for gender-inclusive German (Doppelpunkt).
# Applied in order; longer/more specific patterns should come first.
# Base stems use (?!:in) so already-gendered forms (Spieler:innen) are not matched again.
- pattern: "\\bnur noch (\\d+) Spieler leben\\b"
  replacement: "nur noch \\1 Personen leben"
- pattern: "\\bein anderer Spieler\\b"
  replacement: "eine andere Person"
- pattern: "\\bSpielerinnen\\b"
  replacement: "Spieler:innen"
- pattern: "\\bSpielerin\\b"
  replacement: "Spieler:in"
- pattern: "\\bSpielern\\b"
  replacement: "Spieler:innen"
- pattern: "\\bSpielers\\b"
  replacement: "Spieler:in"
- pattern: "\\bSpieler\\b(?!:in)"
  replacement: "Spieler:in"
- pattern: "\\bErzählerinnen\\b"
  replacement: "Erzähler:innen"
- pattern: "\\bErzählerin\\b"
  replacement: "Erzähler:in"
- pattern: "\\bErzählern\\b"
  replacement: "Erzähler:innen"
- pattern: "\\bErzählers\\b"
  replacement: "Erzähler:in"
- pattern: "\\bErzähler\\b(?!:in)"
  replacement: "Erzähler:in"
- pattern: "\\bBürgerinnen\\b"
  replacement: "Bürger:innen"
- pattern: "\\bBürgerin\\b"
  replacement: "Bürger:in"
- pattern: "\\bBürgern\\b"
  replacement: "Bürger:innen"
- pattern: "\\bBürgers\\b"
  replacement: "Bürger:in"
- pattern: "\\bBürger\\b(?!:in)"
  replacement: "Bürger:in"
- pattern: "\\bMeisterinnen\\b"
  replacement: "Meister:innen"
- pattern: "\\bMeisterin\\b"
  replacement: "Meister:in"
- pattern: "\\bMeistern\\b"
  replacement: "Meister:innen"
- pattern: "\\bMeisters\\b"
  replacement: "Meister:in"
- pattern: "\\bMeister\\b(?!:in)"
  replacement: "Meister:in"
- pattern: "\\bNominierten\\b"
  replacement: "Nominierten"
- pattern: "\\bNominierte\\b"
  replacement: "Nominierte"
- pattern: "\\bAußenseiter\\b(?!:in)"
  replacement: "Außenseiter:in"
